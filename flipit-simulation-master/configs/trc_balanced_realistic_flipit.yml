#
# TRC消融实验：DRL防守 vs 贪心攻击 (FlipIt模式)
# 目的：与Cheat模式对比，验证欺骗机制的理论贡献
#

debug: false
outfile: "trc_balanced_realistic_flipit.csv"
duration: 30  # 海盗攻击短期博弈：最多30回合（控制变量：与Cheat模式一致）
random_seed: 42
scenario: maritime_platform_defense_balanced_flipit
target: offshore_oil_platform

# 关键：使用FlipIt模式（无欺骗）
deception_mode: "flipit"
num_experiments: 15
save_summary: true

# 相同的非线性参数
nonlinear:
  default_alpha_attacker: 0.75
  default_cap_attacker: 0.88
  default_alpha_defender: 0.55
  default_cap_defender: 0.92
  combine_rule: multiplicative_block
  formula: "p_eff(n) = min(cap, 1 - (1 - p)^(n^alpha))"

# 攻击方动作（使用FlipIt模式成功率）
attacker_actions:
  - id: inflatable_fast_boat
    name: 充气快艇袭击
    unit_label: boat
    description: 高速机动，海盗常用战术
    base_success:
      cheat: 0.50      # 不使用
      flipit: 0.30     # FlipIt模式：无欺骗优势
    nonlinear:
      alpha: 0.75
      cap: 0.85
    cost_per_unit: 2.0
    max_units: 4

  - id: hard_hull_speedboat
    name: 武装硬壳快艇
    unit_label: boat
    description: 重武器平台，高威胁但成本高
    base_success:
      cheat: 0.60
      flipit: 0.40     # FlipIt模式：直接武力攻击
    nonlinear:
      alpha: 0.70
      cap: 0.80
    cost_per_unit: 4.0
    max_units: 3

  - id: boarding_assault
    name: 武装登船
    unit_label: team
    description: 直接占领平台，高风险高回报
    base_success:
      cheat: 0.65
      flipit: 0.45     # FlipIt模式：无内应配合
    nonlinear:
      alpha: 0.80
      cap: 0.85
    cost_per_unit: 5.0
    max_units: 2

  - id: standoff_attack
    name: 远程火力攻击
    unit_label: team
    description: RPG/重机枪远程压制
    base_success:
      cheat: 0.45
      flipit: 0.30     # FlipIt模式：无信息优势
    nonlinear:
      alpha: 0.75
      cap: 0.75
    cost_per_unit: 3.0
    max_units: 3

# 防守方动作（FlipIt模式下效果更好）
defender_actions:
  - id: naval_escort
    name: 海军护航
    unit_label: ship
    description: 专业军舰，最强防御
    base_success:
      flipit: 0.90     # FlipIt模式：无信息干扰，效果更好
      cheat: 0.80      # 不使用
    nonlinear:
      alpha: 0.40
      cap: 0.95
    cost_per_unit: 6.0
    max_units: 3

  - id: platform_security
    name: 平台安保
    unit_label: team
    description: 专业安保队伍
    base_success:
      flipit: 0.80     # FlipIt模式：无欺骗干扰
      cheat: 0.65
    nonlinear:
      alpha: 0.55
      cap: 0.90
    cost_per_unit: 2.0
    max_units: 5

  - id: helicopter_support
    name: 直升机支援
    unit_label: helicopter
    description: 快速机动火力支援
    base_success:
      flipit: 0.82     # FlipIt模式：无假情报干扰
      cheat: 0.70
    nonlinear:
      alpha: 0.50
      cap: 0.90
    cost_per_unit: 4.5
    max_units: 3

  - id: automated_systems
    name: 自动防御系统
    unit_label: system
    description: 雷达监控+自动报警
    base_success:
      flipit: 0.75     # FlipIt模式：系统工作正常
      cheat: 0.50
    nonlinear:
      alpha: 0.35
      cap: 0.85
    cost_per_unit: 3.0
    max_units: 4

  - id: patrol_boats
    name: 巡逻艇
    unit_label: boat
    description: 周围水域巡逻
    base_success:
      flipit: 0.70     # FlipIt模式：正常巡逻效果
      cheat: 0.55
    nonlinear:
      alpha: 0.60
      cap: 0.80
    cost_per_unit: 2.0
    max_units: 5

# 控制变量：与Cheat模式完全一致的约束条件
constraints:
  max_units:
    attacker: 4
    defender: 4
  budgeting:
    enabled: true
    attacker_budget: 75.0
    defender_budget: 100.0

environmental_factors:
  weather_condition: "moderate"
  sea_state: 3
  visibility: "normal"
  time_of_day: "day"
  threat_intelligence: "partial"

rew_config:
  success_reward: 0         # 删除成功奖励，只依赖占领奖励
  partial_success: 0        # 删除部分成功奖励
  cost_penalty: 1.0         # 成本惩罚倍率（用于训练奖励计算）
  unit_loss_penalty: 0      # 删除单位损失惩罚
  defense_bonus: 0          # 删除防御奖励
  occupation_reward: 2.0    # 每时间单位占领奖励
  # 新增：每步资源增长配置
  defender_income_per_step: 2.0  # 防守方每步获得2预算
  attacker_income_per_step: 1.0  # 攻击方每步获得1预算

obs_type: "maritime_multiunit"
rew_type: "maritime_multiunit"

# 相同的算法配置
p1_strategy: "maritime_greedy"
p1_config:
  algorithm_type: "greedy"
  move_cost_weight: 1.5
  success_rate_weight: 2.0
  risk_aversion: 0.3
  budget_conservation: 0.6

p0_strategy: "maritime_dqn"
p0_config:
  algorithm_type: "dqn"

# 控制变量：与Cheat模式完全一致的DRL配置（仅deception_mode不同）
drl_config:
  algorithm: "dqn"
  training_episodes: 500      # 控制变量：与Cheat模式一致
  save_frequency: 50          # 控制变量：与Cheat模式一致
  evaluation_frequency: 25    # 控制变量：与Cheat模式一致
  warmup_steps: 1500          # 控制变量：与Cheat模式一致
  
  dqn:
    # ========== 网络架构参数（控制变量：完全一致）==========
    obs_dim: 13             # 控制变量：与Cheat模式一致
    action_dim: 20          # 控制变量：与Cheat模式一致
    max_units: 4            # 控制变量：与Cheat模式一致
    hidden_layers: [128, 128]  # 控制变量：与Cheat模式一致
    
    # ========== 学习参数（控制变量：完全一致）==========
    lr: 0.0005              # 控制变量：与Cheat模式一致
    gamma: 0.92             # 控制变量：与Cheat模式一致
    epsilon_start: 1.0      # 控制变量：与Cheat模式一致
    epsilon_end: 0.01       # 控制变量：与Cheat模式一致
    epsilon_decay: 10000    # 控制变量：与Cheat模式一致
    
    # ========== 训练调度（控制变量：完全一致）==========
    target_update_freq: 300  # 控制变量：与Cheat模式一致
    memory_size: 8000       # 控制变量：与Cheat模式一致
    batch_size: 64          # 控制变量：与Cheat模式一致
    
    # ========== 高级特性（控制变量：完全一致）==========
    double_dqn: true        # 控制变量：与Cheat模式一致
    dueling_network: true   # 控制变量：与Cheat模式一致
    prioritized_replay: true # 控制变量：与Cheat模式一致
    noisy_networks: false   # 控制变量：与Cheat模式一致
    multi_step: true        # 控制变量：与Cheat模式一致
    n_step: 3               # 控制变量：与Cheat模式一致
    distributional: false   # 控制变量：与Cheat模式一致
    device: "auto"          # 控制变量：与Cheat模式一致
    
    # ========== 训练策略（控制变量：完全一致）==========
    gradient_clip: 1.0      # 控制变量：与Cheat模式一致
    weight_decay: 1e-4      # 控制变量：与Cheat模式一致
    learning_starts: 1500   # 控制变量：与Cheat模式一致
    polyak_tau: 0.01        # 控制变量：与Cheat模式一致

evaluation_config:
  evaluation_frequency: 40
  num_episodes: 15
  detailed_logging: true

experiment_type: "ablation_flipit_mode"
experiment_id: "trc_balanced_realistic_drl_defense_vs_greedy_attack_flipit"
focus: "cheat_mechanism_contribution_validation"

